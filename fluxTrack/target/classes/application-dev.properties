# ===================================================================
# DEV profile — in-memory H2
# Active by default. The database lives only in memory: it is created
# fresh on startup and discarded on shutdown, so the demo data from
# fluxTrackApplication.initTestData() is rebuilt on every run.
# ===================================================================

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: browse the in-memory DB at http://localhost:8080/h2-console
# (left disabled because all routes require authentication; enabling it
#  would also need a Spring Security exception for the /h2-console path).
#spring.h2.console.enabled=true
