<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Products &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('products')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <h1>Product Overview</h1>
                    <button class="btn btn-gold" id="open-new-product">+ New Product</button>
                </div>

                <div class="content-toolbar">
                    <div class="search-row">
                        <div class="search-wrap">
                            <input type="text" id="search-input" placeholder="Product name or SKU" class="search-input">
                            <select id="filter-select" class="filter-select">
                                <option value="">Filter</option>
                                <option value="instock">In Stock</option>
                                <option value="outofstock">Out of Stock</option>
                            </select>
                        </div>
                        <button class="search-btn" id="search-btn" aria-label="Search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="select-all"></th>
                            <th>SKU</th>
                            <th>Product</th>
                            <th>Partner</th>
                            <th>Price in CHF</th>
                            <th>Quantity</th>
                            <th>Modify Quantity</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-tbody">
                        <tr><td colspan="9" class="table-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- New Product Modal -->
<div id="product-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
    <div class="modal-content">
        <h2 id="product-modal-title">Add new product</h2>
        <form id="product-form" novalidate>
            <div class="form-group">
                <label for="productName">Product Name<span class="required">*</span></label>
                <input type="text" id="productName" name="productName" placeholder="E.g. Baselbieter Kerner 2022" required>
            </div>
            <div class="form-group">
                <label for="productSKU">SKU<span class="required">*</span></label>
                <input type="text" id="productSKU" name="productSKU" placeholder="E.g. 00083" required>
            </div>
            <div class="form-group hidden" id="partner-picker-group">
                <label for="productPartnerID">Partner<span class="required">*</span></label>
                <select id="productPartnerID" name="productPartnerID">
                    <option value="">Select a partner...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="productPrice">Price in CHF</label>
                <input type="number" step="0.01" min="0" id="productPrice" name="productPrice" placeholder="E.g. 26.80" required>
            </div>
            <div class="form-group">
                <label for="productQuantity">Stock Quantity</label>
                <input type="number" min="0" id="productQuantity" name="productQuantity" placeholder="E.g. 34" required>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-gold-light" id="cancel-modal">Cancel</button>
                <button type="submit" class="btn btn-gold">Confirm</button>
            </div>
            <div id="form-error" class="form-error" role="alert"></div>
        </form>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="product-delete-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content modal-small">
        <h2>Delete product?</h2>
        <p id="product-delete-message" class="confirm-message">Are you sure?</p>
        <div class="modal-actions">
            <button type="button" class="btn btn-gold-light" id="cancel-product-delete-btn">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-product-delete-btn">Delete</button>
        </div>
        <div id="product-delete-error" class="form-error" role="alert"></div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/products.js}"></script>
</body>
</html>
