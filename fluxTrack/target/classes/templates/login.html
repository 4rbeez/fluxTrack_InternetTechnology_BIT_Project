<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &middot; fluxTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <style>
        /* Soft info-banner styling for the "Forgot password?" prototype notice.
           Kept inline here so we don't add a one-off rule to login.css. */
        .forgot-password-message {
            margin: 0 0 1rem 0;
            padding: 0.55rem 0.75rem;
            background: rgba(212, 175, 55, 0.08);
            border-left: 3px solid #d4af37;
            border-radius: 4px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #555;
        }
        .forgot-password-message.hidden {
            display: none;
        }
    </style>
</head>
<body class="login-body">
<div class="login-page">
    <div class="login-card">
        <section class="login-form-section">
            <div class="login-logo-mark"></div>
            <h1>Login</h1>
            <p class="login-subtitle">Login to the fluxTrack Inventory Management System by fluxed GmbH</p>

            <form id="login-form" class="login-form" novalidate>
                <div class="form-group">
                    <label for="username">Username<span class="required">*</span></label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password<span class="required">*</span></label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <a href="#" id="forgot-password-link" class="forgot-password">Forgot password?</a>
                <div id="forgot-password-message" class="forgot-password-message hidden" role="status">
                    Password recovery is not available in this prototype. Please contact your administrator.
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <div id="login-error" class="form-error" role="alert"></div>
            </form>
        </section>
        <section class="login-brand-section">
            <img th:src="@{/images/fluxtrack-logo.png}" alt="fluxTrack" class="login-logo-image">
        </section>
    </div>
</div>
<script th:src="@{/js/auth.js}"></script>
<script>
    // Show a "not implemented" disclaimer when the user clicks "Forgot password?".
    // Scoped inline so this behaviour doesn't leak into auth.js (shared by all pages).
    (function () {
        const link = document.getElementById('forgot-password-link');
        const msg  = document.getElementById('forgot-password-message');
        if (link && msg) {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                msg.classList.remove('hidden');
            });
        }
    })();
</script>
</body>
</html>
