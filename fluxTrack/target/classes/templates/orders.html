<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Order History &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('orders')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <h1>Order History</h1>
                    <div class="order-summary" id="order-summary"></div>
                </div>

                <div class="content-toolbar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label for="order-search-input">Search</label>
                            <input type="text" id="order-search-input" placeholder="Product name" class="search-input">
                        </div>
                        <div class="filter-group">
                            <label for="order-date-from">From</label>
                            <input type="date" id="order-date-from" class="search-input">
                        </div>
                        <div class="filter-group">
                            <label for="order-date-to">To</label>
                            <input type="date" id="order-date-to" class="search-input">
                        </div>
                        <div class="filter-group hidden" id="partner-filter-group">
                            <label for="order-partner-filter">Partner</label>
                            <select id="order-partner-filter" class="filter-select">
                                <option value="">All partners</option>
                            </select>
                        </div>
                        <button class="btn btn-gold-light" id="clear-order-filters">Clear</button>
                    </div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Product</th>
                            <th class="th-partner hidden">Partner</th>
                            <th>Quantity</th>
                            <th>Total (CHF)</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <tr><td colspan="5" class="table-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/orders.js}"></script>
</body>
</html>
