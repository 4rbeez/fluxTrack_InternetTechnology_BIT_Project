<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Support Tickets &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('tickets')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <h1>Support Tickets</h1>
                    <button class="btn btn-gold hidden" id="open-new-ticket">+ Raise Ticket</button>
                </div>

                <div class="content-toolbar">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label for="ticket-search-input">Search</label>
                            <input type="text" id="ticket-search-input" placeholder="Subject or text" class="search-input">
                        </div>
                        <div class="filter-group">
                            <label for="ticket-state-filter">State</label>
                            <select id="ticket-state-filter" class="filter-select">
                                <option value="">All states</option>
                                <option value="OPEN">Open</option>
                                <option value="ANSWERED">Answered</option>
                                <option value="RESOLVED">Resolved</option>
                                <option value="COMPLETED">Completed</option>
                            </select>
                        </div>
                        <div class="filter-group hidden" id="ticket-partner-filter-group">
                            <label for="ticket-partner-filter">Partner</label>
                            <select id="ticket-partner-filter" class="filter-select">
                                <option value="">All partners</option>
                            </select>
                        </div>
                        <button class="btn btn-gold-light" id="clear-ticket-filters">Clear</button>
                    </div>
                </div>

                <div class="tickets-layout">
                    <div class="ticket-list-pane">
                        <ul class="ticket-list" id="ticket-list">
                            <li class="ticket-list-empty">Loading...</li>
                        </ul>
                    </div>
                    <div class="ticket-detail-pane" id="ticket-detail">
                        <div class="ticket-detail-empty">Select a ticket to view the conversation.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- New Ticket Modal (partner only) -->
<div id="ticket-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="ticket-modal-title">
    <div class="modal-content">
        <h2 id="ticket-modal-title">Raise a new ticket</h2>
        <form id="ticket-form" novalidate>
            <div class="form-group">
                <label for="ticketSubject">Subject<span class="required">*</span></label>
                <input type="text" id="ticketSubject" name="ticketSubject" placeholder="E.g. Cannot log in after password reset" required>
            </div>
            <div class="form-group">
                <label for="ticketUrgency">Urgency</label>
                <select id="ticketUrgency" name="ticketUrgency">
                    <option value="LOW">Low</option>
                    <option value="MEDIUM" selected>Medium</option>
                    <option value="HIGH">High</option>
                </select>
            </div>
            <div class="form-group">
                <label for="ticketDescription">Description<span class="required">*</span></label>
                <textarea id="ticketDescription" name="ticketDescription" rows="5" placeholder="Describe the problem in detail..." required></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-gold-light" id="cancel-ticket-modal">Cancel</button>
                <button type="submit" class="btn btn-gold">Submit</button>
            </div>
            <div id="ticket-form-error" class="form-error" role="alert"></div>
        </form>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/tickets.js}"></script>
</body>
</html>
