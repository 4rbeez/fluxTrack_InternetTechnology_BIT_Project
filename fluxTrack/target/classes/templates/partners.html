<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Partners &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('partners')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <h1>Partner Overview</h1>
                    <button class="btn btn-gold" id="open-new-partner">+ New Partner</button>
                </div>

                <div class="content-toolbar">
                    <div class="search-row">
                        <div class="search-wrap">
                            <input type="text" id="partner-search-input" placeholder="Partner name or email" class="search-input">
                        </div>
                        <button class="search-btn" id="partner-search-btn" aria-label="Search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>City</th>
                            <th>Country</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="partners-tbody">
                        <tr><td colspan="7" class="table-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- New/Edit Partner Modal -->
<div id="partner-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="partner-modal-title">
    <div class="modal-content">
        <h2 id="partner-modal-title">Add new partner</h2>
        <form id="partner-form" novalidate>
            <input type="hidden" id="partnerID" name="partnerID">

            <div class="form-group">
                <label for="partnerName">Partner Name<span class="required">*</span></label>
                <input type="text" id="partnerName" name="partnerName" placeholder="E.g. Wylaade GmbH" required>
            </div>
            <div class="form-group">
                <label for="partnerEmail">Email<span class="required">*</span></label>
                <input type="email" id="partnerEmail" name="partnerEmail" placeholder="E.g. info@wylaade.ch" required>
            </div>
            <div class="form-group">
                <label for="partnerPhone">Phone</label>
                <input type="text" id="partnerPhone" name="partnerPhone" placeholder="E.g. +41 61 123 45 67">
            </div>

            <h3 class="form-section-title">Address</h3>
            <div class="form-row">
                <div class="form-group form-group-grow">
                    <label for="addressStreet">Street</label>
                    <input type="text" id="addressStreet" name="addressStreet" placeholder="E.g. Hauptstrasse">
                </div>
                <div class="form-group form-group-shrink">
                    <label for="addressNumber">No.</label>
                    <input type="text" id="addressNumber" name="addressNumber" placeholder="10a">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group form-group-shrink">
                    <label for="addressZip">ZIP</label>
                    <input type="number" id="addressZip" name="addressZip" placeholder="4104">
                </div>
                <div class="form-group form-group-grow">
                    <label for="addressCity">City</label>
                    <input type="text" id="addressCity" name="addressCity" placeholder="Oberwil">
                </div>
            </div>
            <div class="form-group">
                <label for="addressCountry">Country</label>
                <input type="text" id="addressCountry" name="addressCountry" placeholder="Switzerland">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-gold-light" id="cancel-partner-modal">Cancel</button>
                <button type="submit" class="btn btn-gold" id="confirm-partner-btn">Confirm</button>
            </div>
            <div id="partner-form-error" class="form-error" role="alert"></div>
        </form>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content modal-small">
        <h2>Delete partner?</h2>
        <p id="delete-modal-message" class="confirm-message">Are you sure you want to delete this partner? This cannot be undone.</p>
        <div class="modal-actions">
            <button type="button" class="btn btn-gold-light" id="cancel-delete-btn">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
        </div>
        <div id="delete-error" class="form-error" role="alert"></div>
    </div>
</div>

<!-- Access denied for non-admin users -->
<div id="access-denied" class="modal hidden">
    <div class="modal-content modal-small">
        <h2>Admin access required</h2>
        <p class="confirm-message">Partner management is available to admin users only. Redirecting you back to Products...</p>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/partners.js}"></script>
</body>
</html>
