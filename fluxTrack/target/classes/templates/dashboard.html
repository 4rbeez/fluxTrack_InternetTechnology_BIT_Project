<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Dashboard &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <div>
                        <h1>Dashboard</h1>
                        <p class="dashboard-greeting" id="greeting">Welcome back</p>
                    </div>
                </div>

                <div class="stats-grid" id="stats-grid">
                    <!-- Stat cards injected by JS -->
                    <div class="stat-card stat-card-loading">Loading...</div>
                </div>

                <div class="dashboard-section">
                    <h2 class="dashboard-section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        <span>Out of Stock</span>
                    </h2>
                    <div id="out-of-stock-section">
                        <p class="dashboard-empty">Loading...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
