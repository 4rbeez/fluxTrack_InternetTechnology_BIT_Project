<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar" class="topbar">
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
        <div class="bell-wrap" id="bell-wrap">
            <button class="bell-btn" id="bell-btn" aria-label="Notifications">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="bell-dot hidden" id="bell-dot"></span>
            </button>
            <div class="bell-dropdown hidden" id="bell-dropdown" role="menu">
                <div class="bell-dropdown-header">Recent activity</div>
                <ul class="bell-list" id="bell-list">
                    <li class="bell-empty">Nothing new.</li>
                </ul>
            </div>
        </div>

        <div class="user-menu">
            <span class="user-name" id="company-name">Wylaade GmbH</span>
            <button class="user-logout" id="logout-btn" title="Log out">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </button>
        </div>
    </div>
</header>

<script th:src="@{/js/bell.js}"></script>
</body>
</html>
