# ===================================================================
# PROD profile — PostgreSQL
# Activated by setting spring.profiles.active=prod (system property)
# or SPRING_PROFILES_ACTIVE=prod (environment variable).
#
# Database connection details (URL, username, password) are NOT declared
# here, so they never live in the repository. They must be provided at
# runtime, either as JVM system properties:
#
#     -Dspring.datasource.url=jdbc:postgresql://host:port/db
#     -Dspring.datasource.username=...
#     -Dspring.datasource.password=...
#
# or as environment variables (Spring Boot's relaxed binding maps these
# to the spring.datasource.* properties automatically):
#
#     SPRING_DATASOURCE_URL
#     SPRING_DATASOURCE_USERNAME
#     SPRING_DATASOURCE_PASSWORD
#
# If neither is provided at startup, Hikari will fail fast with
# "jdbcUrl is required" — which is the intended behaviour for a
# misconfigured production environment.
# ===================================================================

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect