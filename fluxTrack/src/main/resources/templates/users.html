<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}">
    <title>Users &middot; fluxTrack</title>
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('users')}"></div>
    <div class="main-area">
        <div th:replace="~{fragments/topbar :: topbar}"></div>
        <main class="content">
            <div class="content-card">
                <div class="content-header">
                    <h1>User Management</h1>
                    <button class="btn btn-gold" id="open-new-user">+ New User</button>
                </div>

                <div class="content-toolbar">
                    <div class="search-row">
                        <div class="search-wrap">
                            <input type="text" id="user-search-input" placeholder="Username or display name" class="search-input">
                        </div>
                        <button class="search-btn" id="user-search-btn" aria-label="Search">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Display Name</th>
                            <th>Role</th>
                            <th>Partner</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr><td colspan="6" class="table-empty">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<!-- New/Edit User Modal -->
<div id="user-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="user-modal-title">
    <div class="modal-content">
        <h2 id="user-modal-title">Add new user</h2>
        <form id="user-form" novalidate>
            <input type="hidden" id="userId" name="userId">

            <div class="form-group">
                <label for="userUsername">Username<span class="required">*</span></label>
                <input type="text" id="userUsername" name="userUsername" placeholder="E.g. jdoe" required>
            </div>
            <div class="form-group">
                <label for="userPassword" id="userPasswordLabel">Password<span class="required" id="password-required">*</span></label>
                <input type="password" id="userPassword" name="userPassword" placeholder="Min. 4 characters">
            </div>
            <div class="form-group">
                <label for="userDisplayName">Display Name</label>
                <input type="text" id="userDisplayName" name="userDisplayName" placeholder="E.g. Jane Doe">
            </div>
            <div class="form-group">
                <label for="userRole">Role<span class="required">*</span></label>
                <select id="userRole" name="userRole">
                    <option value="PARTNER">Partner</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="form-group" id="partner-select-group">
                <label for="userPartner">Partner<span class="required">*</span></label>
                <select id="userPartner" name="userPartner">
                    <option value="">— select partner —</option>
                </select>
            </div>
            <div class="form-group" id="logo-path-group">
                <label for="userLogoPath">Logo Path</label>
                <input type="text" id="userLogoPath" name="userLogoPath" placeholder="/images/partners/logo.png">
            </div>

            <!-- Avatar upload (visible in edit mode only) -->
            <div class="form-group" id="avatar-upload-group" style="display:none;">
                <label>Avatar</label>
                <div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
                    <img id="avatar-preview" src="" alt="Avatar" style="display:none; width:48px; height:48px; border-radius:50%; object-fit:cover; border:2px solid #e0d6c8;">
                    <div>
                        <label class="btn btn-gold-light" style="cursor:pointer; margin-bottom:4px;">
                            Choose image…
                            <input type="file" id="avatarFile" accept="image/*" style="display:none;">
                        </label>
                        <button type="button" class="btn btn-gold-light" id="remove-avatar-btn" style="display:none; margin-left:8px;">Remove</button>
                        <div id="avatar-status" class="form-hint" style="margin-top:4px; font-size:0.85em;"></div>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-gold-light" id="cancel-user-modal">Cancel</button>
                <button type="submit" class="btn btn-gold" id="confirm-user-btn">Confirm</button>
            </div>
            <div id="user-form-error" class="form-error" role="alert"></div>
        </form>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content modal-small">
        <h2>Delete user?</h2>
        <p id="delete-modal-message" class="confirm-message">Are you sure you want to delete this user? This cannot be undone.</p>
        <div class="modal-actions">
            <button type="button" class="btn btn-gold-light" id="cancel-delete-btn">Cancel</button>
            <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
        </div>
        <div id="delete-error" class="form-error" role="alert"></div>
    </div>
</div>

<!-- Access denied for non-admin users -->
<div id="access-denied" class="modal hidden">
    <div class="modal-content modal-small">
        <h2>Admin access required</h2>
        <p class="confirm-message">User management is available to admin users only. Redirecting you back to Products...</p>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/users.js}"></script>
</body>
</html>
