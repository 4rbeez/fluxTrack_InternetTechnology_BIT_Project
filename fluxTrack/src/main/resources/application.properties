spring.application.name=fluxtrack
server.forward-headers-strategy=framework

# -------------------------------------------------------------------
# Active profile
# Defaults to 'dev' (in-memory H2) for local development.
# In production, set the SPRING_PROFILES_ACTIVE environment variable to 'prod'
# to switch to PostgreSQL (see application-prod.properties).
# -------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -------------------------------------------------------------------
# JPA / Hibernate (shared by both profiles)
# 'update' creates any missing tables and leaves existing data intact.
# -------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update

# -------------------------------------------------------------------
# Security — JWT signing key
# Read from the JWT_KEY environment variable when present; otherwise falls back
# to the development key below. In production, ALWAYS provide a fresh JWT_KEY
# env var — the fallback value must never be relied upon outside local dev.
# -------------------------------------------------------------------
jwt.key=${JWT_KEY:mysecretkey-4107-fabarn-rembru-silmei-flostie-4106-fluxTrack-123456789}
